<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Smartx TV - Home</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="assets/player.css" />
	<link rel="stylesheet" href="assets/style.css" />
	<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
	<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-ui.js"></script>
</head>

<body>
	<div class="grain-layer" aria-hidden="true"></div>

	<div class="tv-shell">
		<header class="app-header panel" aria-label="Barra principal">
			<div class="brand-block">
				<div class="brand-mark">S</div>
				<div>
					<p class="brand-title">Smartx TV</p>
				</div>
			</div>

			<nav class="header-nav" aria-label="Menu horizontal">
				<button class="menu-item is-active" data-focusable="true" data-action="section" data-section="inicio"
					aria-label="Inicio">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<path d="M3.5 12a8.5 8.5 0 0 1 4.3-7.35"></path>
							<path d="M20.5 12a8.5 8.5 0 0 0-4.3-7.35"></path>
							<path d="M7.5 12a4.6 4.6 0 0 1 2.45-4"></path>
							<path d="M16.5 12a4.6 4.6 0 0 0-2.45-4"></path>
							<circle cx="12" cy="12" r="1.55"></circle>
						</svg>
					</span>
					<span class="menu-item-label">Inicio</span>
				</button>
				<button class="menu-item" data-focusable="true" data-action="section" data-section="canais"
					aria-label="Canais">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<rect x="6" y="3.8" width="12" height="16.4" rx="2.4"></rect>
							<circle cx="10" cy="8" r="0.9"></circle>
							<circle cx="14" cy="8" r="0.9"></circle>
							<path d="M8.8 11.2h6.4"></path>
							<path d="M8.8 13.9h6.4"></path>
							<path d="M10.2 16.8h3.6"></path>
						</svg>
					</span>
					<span class="menu-item-label">Canais</span>
				</button>
				<button class="menu-item" data-focusable="true" data-action="section" data-section="minha-lista"
					aria-label="Minha lista">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<path
								d="m12 4.35 2.33 4.72 5.2.76-3.76 3.66.88 5.18L12 16.22l-4.65 2.45.88-5.18-3.76-3.66 5.2-.76z">
							</path>
						</svg>
					</span>
					<span class="menu-item-label">Minha lista</span>
				</button>
				<button class="menu-item" data-focusable="true" data-action="section" data-section="series"
					aria-label="Series">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<path d="M4.8 8.1h14.4v8.9H4.8z"></path>
							<path d="M9.2 19h5.6"></path>
							<path d="M8 5.6h8"></path>
							<path d="M10.1 3.9h3.8"></path>
							<path d="M7.2 11.1h.01"></path>
							<path d="M10 11.1h.01"></path>
							<path d="M12.8 11.1h.01"></path>
							<path d="M15.6 11.1h.01"></path>
						</svg>
					</span>
					<span class="menu-item-label">Series</span>
				</button>
				<button class="menu-item" data-focusable="true" data-action="section" data-section="filmes"
					aria-label="Filmes">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<rect x="4.9" y="5.2" width="14.2" height="13.6" rx="1.9"></rect>
							<path d="M9.2 5.2v13.6"></path>
							<path d="M14.8 5.2v13.6"></path>
							<path d="M4.9 10.2h14.2"></path>
							<path d="M4.9 13.8h14.2"></path>
						</svg>
					</span>
					<span class="menu-item-label">Filmes</span>
				</button>
				<button class="menu-item" data-focusable="true" data-action="section"
					data-section="videoconferencia" aria-label="Videoconferencia">
					<span class="menu-item-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24">
							<path
								d="M8.2 4.9h2.1a1.2 1.2 0 0 1 1.17.94l.42 1.9a1.2 1.2 0 0 1-.35 1.1l-1.08 1.02a11.9 11.9 0 0 0 3.66 3.66l1.02-1.08a1.2 1.2 0 0 1 1.1-.35l1.9.42a1.2 1.2 0 0 1 .94 1.17v2.1a1.2 1.2 0 0 1-1.2 1.2h-1.3A12.6 12.6 0 0 1 6 7.4V6.1a1.2 1.2 0 0 1 1.2-1.2z">
							</path>
						</svg>
					</span>
					<span class="menu-item-label">Videoconferencia</span>
				</button>
			</nav>

			<div class="header-actions">
				<div id="search-overlay" class="search-overlay" aria-hidden="true">
					<button class="search-btn search-trigger" data-focusable="true" data-action="open-search" data-feature="search"
						aria-label="Abrir busca">
						<svg viewBox="0 0 24 24" aria-hidden="true">
							<circle cx="11" cy="11" r="7"></circle>
							<line x1="16.65" y1="16.65" x2="21" y2="21"></line>
						</svg>
					</button>
					<div class="search-shell">
						<input id="search-input" type="text" placeholder="Pesquisar programas..." aria-label="Pesquisar programas" />
						<button class="search-close-btn" data-action="search-close" aria-label="Fechar busca">✕</button>
					</div>
				</div>

				<div class="profile-chip brand-profile-chip" data-focusable="true" data-action="roadmap"
					data-feature="perfil-nuvem" role="button" tabindex="0" aria-label="Abrir perfil na nuvem">
					<p class="profile-name">Davi</p>
					<img src="./assets/img/profile.webp" alt="Avatar de Davi" />
				</div>
			</div>
		</header>

		<main class="dashboard panel" aria-label="Conteudo principal">
			<header class="topbar">
				<button id="details-back-btn-top" class="details-topbar-back" data-focusable="false"
					data-group="content" data-action="details-back" aria-label="Voltar para canais">&#10094;</button>
				<div>
					<h1 id="section-title">Canais em destaque hoje</h1>
				</div>
			</header>

			<section id="dashboard-content" class="dashboard-content" aria-live="polite"></section>
		</main>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite"></div>

	<script src="assets/script.js"></script>
</body>

</html>
